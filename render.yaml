services:
  - type: web
    name: axo-render-crawler
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CRAWL_CONCURRENCY
        value: "250"
      - key: PER_HOST_CONCURRENCY
        value: "50"
      - key: SITEMAP_CONCURRENCY
        value: "100"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "8"
      - key: DEFAULT_LIMIT
        value: "15000"
      - key: MAX_LIMIT
        value: "150000"
      - key: MAX_BYTES_PER_PAGE
        value: "400000"
      - key: MAX_TEXT_CHARS_PER_PAGE
        value: "25000"
      - key: ANALYSIS_READY_MIN_PAGES
        value: "750"
      - key: ANALYSIS_READY_MAX_SECONDS
        value: "60"
      - key: HTTP2_ENABLED
        value: "1"
